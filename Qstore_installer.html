<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Installer Links</title>
</head>
<body>
    <h1>Generate Installer Links</h1>
    <form id="installerForm">
        <label for="backupFile">Upload Backup File:</label>
        <input type="file" id="backupFile" accept=".zip" required>
        <br><br>
        <label for="email">Admin Email:</label>
        <input type="email" id="email" required>
        <br><br>
        <button type="submit">Generate Link</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('installerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('/generate-installer-link', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerText = `Installer Link: ${data.link}`;
            })
            .catch(error => {
                document.getElementById('result').innerText = 'Error generating link!';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Qstore Generate Installer Link</title>\n    <script>\n        function generateLink() {\n            const input = document.getElementById('backupJson').value;\n            try {\n                const jsonData = JSON.parse(input); // Validate JSON data\n                const base64Data = btoa(JSON.stringify(jsonData)); // Encode to base64\n                const link = `https://example.com/install?backup=${base64Data}`; // Generate link\n                document.getElementById('result').innerText = link; // Display result\n            } catch (e) {\n                alert('Invalid JSON data. Please check your input.');\n            }\n        }\n    </script>\n</head>\n<body>\n    <h1>Generate Installation Link</h1>\n    <textarea id="backupJson" rows="10" cols="50" placeholder="Paste your exported backup JSON here..."></textarea><br>\n    <button onclick="generateLink()">Generate Link</button>\n    <h2>Installation Link:</h2>\n    <div id="result" style="word-break: break-all;"></div>\n</body>\n</html>
